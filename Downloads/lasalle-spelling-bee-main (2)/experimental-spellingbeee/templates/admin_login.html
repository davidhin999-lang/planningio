<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Spelling Bee</title>
  <link rel="stylesheet" href="/static/tailwind.output.css?v={{ range(1,99999)|random }}">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Nunito', sans-serif; }
    .card { background: rgba(255,255,255,0.07); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 24px;
      padding: 48px 40px; width: 100%; max-width: 380px; text-align: center; }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { color: #fff; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    p { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 32px; }
    input[type="password"] { width: 100%; padding: 14px 18px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08);
      color: #fff; font-size: 16px; font-family: 'Nunito', sans-serif; outline: none;
      margin-bottom: 16px; transition: border-color 0.2s; }
    input[type="password"]:focus { border-color: #f59e0b; }
    button { width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff; font-size: 16px; font-weight: 800; cursor: pointer;
      font-family: 'Nunito', sans-serif; transition: opacity 0.2s; }
    button:hover { opacity: 0.9; }
    .error { color: #f87171; font-size: 14px; margin-bottom: 12px; }
    .back { margin-top: 20px; }
    .back a { color: rgba(255,255,255,0.4); font-size: 13px; text-decoration: none; }
    .back a:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>Admin Panel</h1>
    <p>Enter the admin password to manage teams</p>
    <div id="error-msg" class="error" style="display:none"></div>
    <div>
      <input type="password" id="pw-input" placeholder="Password..." autofocus autocomplete="current-password" />
      <button onclick="doLogin()" style="margin-top:12px">Login →</button>
    </div>
    <div class="back"><a href="/">← Back to Game</a></div>
    <script>
      // If already have a stored password, try it silently
      (function() {
        var stored = localStorage.getItem('admin_pw');
        if (stored) {
          fetch('/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: stored })
          }).then(function(r) {
            if (r.ok) window.location.href = '/admin';
            else localStorage.removeItem('admin_pw');
          }).catch(function() {});
        }
      })();

      document.getElementById('pw-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
      });

      function doLogin() {
        var pw = document.getElementById('pw-input').value;
        var errEl = document.getElementById('error-msg');
        errEl.style.display = 'none';
        fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d }; }); })
          .then(function(res) {
            if (res.ok) {
              localStorage.setItem('admin_pw', pw);
              window.location.href = '/admin';
            } else {
              errEl.textContent = res.d.error || 'Wrong password.';
              errEl.style.display = 'block';
              localStorage.removeItem('admin_pw');
            }
          }).catch(function() {
            errEl.textContent = 'Connection error.';
            errEl.style.display = 'block';
          });
      }
    </script>
  </div>
</body>
</html>
